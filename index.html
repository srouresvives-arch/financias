// ── FIREBASE ──────────────────────────────────────────────────────────────────
const waitFS=()=>new Promise(r=>{if(window._fsReady)return r();window.addEventListener('fsReady',r,{once:true});setTimeout(r,6000)});

const dbLoad=async(uid,key,fb)=>{
  try{
    await waitFS();
    const db=window._db;
    if(!db)return fb;
    const s=await db._getDoc(db._doc(db,`users/${uid}/data`,key));
    return s.exists()?s.data().v:fb;
  }catch{return fb}
};

const dbSave=async(uid,key,val)=>{
  try{
    await waitFS();
    const db=window._db;
    if(!db)return;
    await db._setDoc(db._doc(db,`users/${uid}/data`,key),{v:val});
  }catch(e){console.error(e)}
};

// ── MIGRATION: old /finanzas -> users/{uid}/data ──────────────────────────────
const migrateOldData=async(uid)=>{
  try{
    await waitFS();
    const db=window._db;
    if(!db)return false;

    // Check if migration already done
    const migrated=await db._getDoc(db._doc(db,`users/${uid}/data`,'_migrated'));
    if(migrated.exists())return false;

    const oldKeys=['accs','cats','exps','dist','savs','goals','invs','mlist','theme','currency','exRate'];
    const oldRef=(key)=>db._doc(db,'finanzas',key);

    for(const key of oldKeys){
      try{
        const snap=await db._getDoc(oldRef(key));
        if(!snap.exists())continue;
        const data=snap.data();
        let val=data.v!==undefined?data.v:data;

        // If it's supposed to be an array but came as object, convert it
        const arrayKeys=['accs','cats','exps','savs','goals','invs','mlist'];
        if(arrayKeys.includes(key)){
          if(!Array.isArray(val)){
            // Convert object with numeric keys to array, or just use empty array
            if(typeof val==='object'&&val!==null){
              val=Object.values(val);
            } else {
              val=[];
            }
          }
          // Normalize balanceGBP for accs
          if(key==='accs'){
            val=val.map(a=>({...a,balanceGBP:a.balanceGBP!==undefined?a.balanceGBP:(a.balance||0)}));
          }
        }
        await dbSave(uid,key,val);
      }catch(e){
        console.warn('Migration skip key:',key,e);
      }
    }

    // Mark migration as done so it never runs again
    await db._setDoc(db._doc(db,`users/${uid}/data`,'_migrated'),{v:true,ts:Date.now()});
    return true;
  }catch(e){
    console.error('Migration error:',e);
    return false;
  }
};

        setAccs(normalized);
      }
      if(sv)setSavs(sv);
      if(c)setCats(c);
      if(e)setExps(e);
      if(g)setGoals(g);
      if(iv)setInvs(iv);
      if(ml)setMlist(ml);
      if(tn)setThemeName(tn);
      if(cu)setCurrency(cu);
      if(er)setExRate(er);
      setLd(false);
    })();
  },[user]);

  const uid=user?.uid;
  const sy=(k,v)=>{if(!uid)return;setSync(true);dbSave(uid,k,v);setTimeout(()=>setSync(false),900)};
  const uDist=v=>{setDist(v);sy('dist',v)};
  const uAccs=v=>{setAccs(v);sy('accs',v)};
  const uSavs=v=>{setSavs(v);sy('savs',v)};
  const uCats=v=>{setCats(v);sy('cats',v)};
  const uExps=v=>{setExps(v);sy('exps',v)};
  const uGoals=v=>{setGoals(v);sy('goals',v)};
  const uInvs=v=>{setInvs(v);sy('invs',v)};
  const uMlist=v=>{setMlist(v);sy('mlist',v)};
  const uTheme=v=>{setThemeName(v);sy('theme',v)};
  const uCurrency=v=>{setCurrency(v);sy('currency',v)};
  const uExRate=v=>{setExRate(v);sy('exRate',v)};

  const fmt=(gbp)=>{
    if(currency==='EUR'){const e=gbp*exRate;return `€${e.toFixed(2)}`;}
    return `£${gbp.toFixed(2)}`;
  };
  const fmtN=(gbp)=>currency==='EUR'?gbp*exRate:gbp;
  const sym=currency==='EUR'?'€':'£';
  const toGBP=(val)=>currency==='EUR'?val/exRate:val;

  const totBal=accs.reduce((s,a)=>s+(a.balanceGBP||a.balance||0),0);
  const totSav=accs.filter(a=>a.type==='savings').reduce((s,a)=>s+(a.balanceGBP||a.balance||0),0);

  useEffect(()=>{
    document.body.style.background=theme.bg;
    document.body.style.color=theme.text;
  },[theme]);

  if(user===undefined)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0f1117'}}><Spin/></div>;
  if(!user)return<Login/>;
  if(migrating)return<div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,background:theme.bg}}><Spin c={theme.accent}/><p style={{color:theme.text3,fontSize:14,margin:0}}>Migrando tus datos...</p></div>;
  if(ld)return<div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,background:theme.bg}}><Spin c={theme.accent}/><p style={{color:theme.text3,fontSize:14,margin:0}}>Cargando tus datos...</p></div>;

  const sp={theme,dist,uDist,accs,uAccs,savs,uSavs,cats,uCats,exps,uExps,goals,uGoals,invs,uInvs,mlist,uMlist,totBal,totSav,setView,fmt,fmtN,sym,toGBP,currency,uCurrency,exRate,uExRate,themeName,uTheme};

  return(
    <ThemeCtx.Provider value={{theme,themeName}}>
    <div style={{minHeight:'100vh',background:theme.bg,paddingBottom:88}}>
      <div style={{position:'fixed',top:0,right:0,padding:'10px 14px',zIndex:100,display:'flex',alignItems:'center',gap:8}}>
        <span className="sd" style={{background:sync?theme.yellow:theme.green}}/>
        <span style={{fontSize:10,color:theme.text3,fontFamily:'DM Mono'}}>{sync?'sync...':'sync ✓'}</span>
        <button onClick={()=>window._signOut()} style={{background:'none',border:'none',color:theme.text3,cursor:'pointer',padding:'2px 4px',marginLeft:2}}><OutIc/></button>
      </div>
      <div style={{maxWidth:480,margin:'0 auto',padding:'16px 16px 0'}}>

        {view==='expenses'&&<ExpsV {...sp}/>}

        {view==='goals'&&<GoalsV {...sp}/>}
        {view==='investments'&&<InvsV {...sp}/>}
        {view==='settings'&&<SettingsV {...sp}/>}
      </div>

};

// ── EXPENSES ──────────────────────────────────────────────────────────────────
const ExpsV=({cats,uCats,exps,uExps,mlist,uMlist,fmt,fmtN,sym,toGBP,currency,theme})=>{
  const today=new Date();const defKey=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const [selKey,setSelKey]=useState(mlist.find(m=>m.key===defKey)?.key||mlist[0]?.key||'');
  const [showCat,setShowCat]=useState(false);const [showMon,setShowMon]=useState(false);
  const [newCat,setNewCat]=useState('');const [eCat,setECat]=useState(null);const [tCat,setTCat]=useState('');
  const [local,setLocal]=useState({});const [nmName,setNmName]=useState('');const [nmYear,setNmYear]=useState('');
  const [inputCur,setInputCur]=useState(currency);
  const selMon=mlist.find(m=>m.key===selKey);
  const COLS=['#ff6b6b','#f59e0b','#22d3a5','#6c63ff','#ec4899','#8b5cf6','#10b981','#f97316'];

  useEffect(()=>{
    if(!selKey)return;
    const map={};
    cats.forEach(c=>{const e=exps.find(x=>x.cid===c.id&&x.mk===selKey);map[c.id]=e?fmtN(e.amountGBP||e.amount).toFixed(2):(c.def?(inputCur==='EUR'?fmtN(c.def).toFixed(2):c.def.toString()):'');});
    setLocal(map);
  },[selKey,cats.length,inputCur]);

  const getAmt=cid=>{const e=exps.find(x=>x.cid===cid&&x.mk===selKey);return e?(e.amountGBP||e.amount):(cats.find(c=>c.id===cid)?.def||0);};
  const commit=(cid,raw)=>{
    const dispAmt=parseFloat(raw)||0;const gbp=inputCur==='EUR'?dispAmt/1.17:dispAmt;
    const idx=exps.findIndex(x=>x.cid===cid&&x.mk===selKey);
    let up;if(idx>=0){up=[...exps];up[idx]={...up[idx],amountGBP:gbp};}
    else up=[...exps,{id:Date.now(),cid,mk:selKey,amountGBP:gbp}];
    uExps(up);
  };
  const totM=cats.reduce((s,c)=>s+getAmt(c.id),0);
  const cd=cats.map((c,i)=>({name:c.name,amt:getAmt(c.id),col:COLS[i%8]})).filter(c=>c.amt>0);
  const cdTot=cd.reduce((s,c)=>s+c.amt,0);

  const Donut=()=>{
    const r=56,cx=74,cy=74,sw=15,circ=2*Math.PI*r;let off=0;
    return(<svg width={148} height={148} style={{display:'block',margin:'0 auto'}}>
      {cdTot===0?<circle cx={cx} cy={cy} r={r} fill="none" stroke={theme.border} strokeWidth={sw}/>:
        cd.map((d,i)=>{const pct=d.amt/cdTot,dash=pct*circ;const el=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.col} strokeWidth={sw} strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-off*circ+circ/4}/>;off+=pct;return el;})
      }
      <text x={cx} y={cy-5} textAnchor="middle" fill={theme.text} fontSize="13" fontWeight="700" fontFamily="DM Mono">{sym}{fmtN(cdTot).toFixed(0)}</text>
      <text x={cx} y={cy+10} textAnchor="middle" fill={theme.text3} fontSize="9">total mes</text>
    </svg>);
  };

  const addMonth=()=>{
    const y=parseInt(nmYear);if(!nmName||isNaN(y)||y<2024||y>2035)return;
    const idx=MES.indexOf(nmName);if(idx<0)return;
    const key=`${y}-${String(idx+1).padStart(2,'0')}`;if(mlist.find(m=>m.key===key))return;
    const nl=[...mlist,{key,label:`${nmName} ${y}`,month:nmName,year:y}].sort((a,b)=>a.key.localeCompare(b.key));
    uMlist(nl);setNmName('');setNmYear('');setShowMon(false);
    setTimeout(()=>document.getElementById(`ch-${key}`)?.scrollIntoView({behavior:'smooth',inline:'center'}),300);
  };

  return(
    <div style={{paddingTop:8,display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h2 style={{margin:0,fontSize:22,fontWeight:700,color:theme.text}}>Gastos</h2>
        <Btn onClick={()=>setShowCat(true)} style={{width:'auto',padding:'10px 14px',display:'flex',alignItems:'center',gap:6,fontSize:13}}><PlusIc/>Categoría</Btn>
      </div>
      {showCat&&(
        <Card style={{padding:16,display:'flex',flexDirection:'column',gap:10}}>
          <Inp type="text" placeholder="Nueva categoría" value={newCat} onChange={e=>setNewCat(e.target.value)} autoFocus onKeyDown={e=>{if(e.key==='Enter'&&newCat.trim()){uCats([...cats,{id:Date.now(),name:newCat.trim(),def:0}]);setNewCat('');setShowCat(false)}}}/>
          <div style={{display:'flex',gap:10}}>
            <Btn onClick={()=>{if(newCat.trim()){uCats([...cats,{id:Date.now(),name:newCat.trim(),def:0}]);setNewCat('');setShowCat(false)}}}>Guardar</Btn>
            <BtnS onClick={()=>setShowCat(false)}>Cancelar</BtnS>
          </div>
        </Card>
      )}

const StatsV=({cats,exps,totBal,totSav,mlist,fmt,fmtN,sym,theme})=>{

  const ct=cats.map(c=>({name:c.name,amt:exps.filter(e=>e.cid===c.id).reduce((s,e)=>s+(e.amountGBP||e.amount||0),0)})).filter(c=>c.amt>0);

  const mx=Math.max(...mt.map(m=>m.tot),1);

  const LineChart=()=>{

    const W=320,H=90,pad=10;

    const pts=xs.map((x,i)=>`${x},${ys[i]}`).join(' ');
    const fillPts=`${xs[0]},${H} `+xs.map((x,i)=>`${x},${ys[i]}`).join(' ')+` ${xs[xs.length-1]},${H}`;
    return(
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:'block',overflow:'visible'}}>

        <polygon points={fillPts} fill="url(#lineGrad)"/>

        {xs.map((x,i)=>(
          <g key={i}>

        <Card style={{padding:16}}><p style={{margin:'0 0 4px',fontSize:11,color:theme.text3,textTransform:'uppercase',letterSpacing:.5}}>En ahorro</p><p style={{margin:0,fontSize:22,fontWeight:700,fontFamily:'DM Mono',color:theme.green}}>{sym}{fmtN(totSav).toFixed(0)}</p></Card>

        </Card>

      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:450,tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:`Busca noticias recientes sobre ${inv.ticker} (${inv.company}). Invertí ${inv.invCurrency||inv.currency}${invested.toFixed(2)} a ${inv.invCurrency||inv.currency}${inv.buyPrice}/acc el ${inv.buyDate}.${pl!==null?` P&L: ${plP}% (${pl>=0?'+':''}${inv.invCurrency||inv.currency}${pl.toFixed(2)}).`:''} Dame tu opinión honesta y directa en 3-4 frases en español informal (tuteo): situación reciente, algo notable, y si mantendrías/comprarías más/venderías una parte. Recuerda al final que es solo tu opinión.`}]
      })});
      const d=await res.json();setAna(a=>({...a,[inv.id]:d.content?.map(c=>c.text||'').join('')||'Sin respuesta'}));
    }catch{setAna(a=>({...a,[inv.id]:'Error al conectar. Inténtalo de nuevo.'}))}
    setLdA(a=>({...a,[inv.id]:false}));
  };

  useEffect(()=>{invs.forEach(i=>fetchPrice(i.ticker));},[invs.length]);

  const tI=invs.reduce((s,i)=>s+i.shares*i.buyPrice,0);
  const tC=invs.reduce((s,i)=>{const p=prices[i.ticker];return s+(p?.price?p.price*i.shares:i.shares*i.buyPrice);},0);
  const tPL=tC-tI,tPLp=tI>0?((tPL/tI)*100):0;

  const RANGES=['1wk','1mo','3mo','1y'];
  const RANGE_LABELS={'1wk':'1S','1mo':'1M','3mo':'3M','1y':'1A'};

  const MiniChart=({ticker,r})=>{
    const key=`${ticker}-${r}`;const pts=hist[key]||[];
    if(pts.length<2)return<p style={{color:theme.text3,fontSize:12,textAlign:'center',margin:'8px 0'}}>Sin datos históricos</p>;
    const prices2=pts.map(p=>p.p);const mn=Math.min(...prices2);const mx2=Math.max(...prices2);const rng=mx2-mn||1;
    const W=300,H=80,pd=8;
    const xs=pts.map((_,i)=>pd+(i/(pts.length-1))*(W-pd*2));
    const ys=pts.map(p=>H-pd-((p.p-mn)/rng)*(H-pd*2));
    const line=xs.map((x,i)=>`${x},${ys[i]}`).join(' ');
    const fill=`${xs[0]},${H} `+line+` ${xs[xs.length-1]},${H}`;
    const isUp=prices2[prices2.length-1]>=prices2[0];
    const col=isUp?theme.green:theme.red;
    return(
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:'block'}}>
        <defs><linearGradient id={`hg-${ticker}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={col} stopOpacity="0.25"/><stop offset="100%" stopColor={col} stopOpacity="0"/></linearGradient></defs>
        <polygon points={fill} fill={`url(#hg-${ticker})`}/>
        <polyline points={line} fill="none" stroke={col} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
        <circle cx={xs[xs.length-1]} cy={ys[ys.length-1]} r={3.5} fill={col}/>
        <text x={pd} y={H-2} fill={theme.text3} fontSize="8" fontFamily="DM Mono">{pts[0].t.toLocaleDateString('es',{month:'short',day:'numeric'})}</text>
        <text x={W-pd} y={H-2} textAnchor="end" fill={theme.text3} fontSize="8" fontFamily="DM Mono">{pts[pts.length-1].t.toLocaleDateString('es',{month:'short',day:'numeric'})}</text>
      </svg>
    );
  };

  return(
    <div style={{paddingTop:8,display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h2 style={{margin:0,fontSize:22,fontWeight:700,color:theme.text}}>Inversiones</h2>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>invs.forEach(i=>fetchPrice(i.ticker))} style={{background:theme.bg2,border:`1px solid ${theme.border}`,color:theme.text3,borderRadius:10,padding:'10px 12px',cursor:'pointer',display:'flex',alignItems:'center'}}><RefIc/></button>
          <Btn onClick={()=>setShow(true)} style={{width:'auto',padding:'10px 14px',display:'flex',alignItems:'center',gap:6,fontSize:13}}><PlusIc/>Añadir</Btn>
        </div>
      </div>
      {invs.length>0&&(
        <div style={{background:theme.hero,borderRadius:20,padding:20,border:`1px solid ${theme.heroBorder}`}}>
          <p style={{margin:'0 0 2px',fontSize:11,color:'rgba(255,255,255,.4)',textTransform:'uppercase',letterSpacing:1}}>Portfolio</p>
          <p style={{margin:'0 0 10px',fontSize:30,fontWeight:700,fontFamily:'DM Mono',color:'#fff'}}>${tC.toFixed(2)}</p>
          <div style={{display:'flex',gap:16}}>
            <div><p style={{margin:'0 0 2px',fontSize:10,color:'rgba(255,255,255,.4)'}}>Invertido</p><p style={{margin:0,fontFamily:'DM Mono',fontWeight:600,color:'rgba(255,255,255,.8)',fontSize:14}}>${tI.toFixed(2)}</p></div>
            <div><p style={{margin:'0 0 2px',fontSize:10,color:'rgba(255,255,255,.4)'}}>P&L</p><p style={{margin:0,fontFamily:'DM Mono',fontWeight:600,color:tPL>=0?theme.green:theme.red,fontSize:14}}>{tPL>=0?'+':''}{tPL.toFixed(2)} ({tPLp>=0?'+':''}{tPLp.toFixed(1)}%)</p></div>
          </div>
        </div>
      )}
      {show&&(
        <Card style={{padding:20,display:'flex',flexDirection:'column',gap:12}}>
          <h3 style={{margin:'0 0 4px',fontSize:15,fontWeight:600,color:theme.text}}>Nueva Posición</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {[['Ticker','AAPL','ticker',true],['Empresa','Apple','company',false],['Nº acciones','10','shares',false],['Precio compra','150','buyPrice',false],['Fecha compra','Enero 2025','buyDate',false]].map(([lb,ph,k,up])=>(
              <div key={k}><label style={{fontSize:11,color:theme.text3,display:'block',marginBottom:4}}>{lb}</label>
              <Inp type={k==='shares'||k==='buyPrice'?'number':'text'} inputMode={k==='shares'||k==='buyPrice'?'decimal':'text'} placeholder={ph} value={nw[k]} onChange={e=>setNw({...nw,[k]:up?e.target.value.toUpperCase():e.target.value})} style={up?{textTransform:'uppercase'}:{}}/></div>
            ))}
            <div><label style={{fontSize:11,color:theme.text3,display:'block',marginBottom:4}}>Moneda inversión</label>
              <Sel value={nw.currency} onChange={e=>setNw({...nw,currency:e.target.value})}>
                <option value="USD">$ USD</option><option value="GBP">£ GBP</option><option value="EUR">€ EUR</option>
              </Sel>
            </div>
          </div>
          <div style={{display:'flex',gap:10,marginTop:4}}>
            <Btn onClick={()=>{if(nw.ticker&&nw.shares&&nw.buyPrice){const i={id:Date.now(),...nw,ticker:nw.ticker.toUpperCase(),shares:parseFloat(nw.shares),buyPrice:parseFloat(nw.buyPrice),invCurrency:nw.currency};uInvs([...invs,i]);setNw({ticker:'',company:'',shares:'',buyPrice:'',buyDate:'',currency:'USD'});setShow(false);setTimeout(()=>fetchPrice(i.ticker),300)}}} >Añadir</Btn>
            <BtnS onClick={()=>setShow(false)}>Cancelar</BtnS>
          </div>
        </Card>
      )}
      {invs.length===0&&!show&&<Card style={{padding:40,textAlign:'center'}}><p style={{fontSize:36,margin:'0 0 8px'}}>📈</p><p style={{color:theme.text3,fontSize:14,margin:0}}>Sin inversiones aún</p></Card>}
      {invs.map(inv=>{
        const p=prices[inv.ticker];const isLd=ldP[inv.ticker];
        const invested=inv.shares*inv.buyPrice;const cur=p?.price?p.price*inv.shares:null;
        const pl=cur?cur-invested:null;const plP=pl?((pl/invested)*100):null;const pos=pl!==null?pl>=0:true;
        const isExp=expId===inv.id;const selRange=range[inv.ticker]||'1mo';
        const s=inv.invCurrency||inv.currency||'$';const sym2=s==='GBP'?'£':s==='EUR'?'€':'$';
        return(
          <Card key={inv.id} style={{padding:20}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2}}>
                  <span style={{fontSize:18,fontWeight:800,fontFamily:'DM Mono',color:theme.text}}>{inv.ticker}</span>
                  <span style={{background:theme.tag,color:theme.tagText||theme.accent,padding:'2px 8px',borderRadius:12,fontSize:11,fontWeight:600}}>{s}</span>
                  {p?.price&&<span className="tg" style={{background:pos?`${theme.green}18`:`${theme.red}18`,color:pos?theme.green:theme.red}}>{pos?'▲':'▼'}{Math.abs(p.changePct||0).toFixed(2)}%</span>}
                </div>
                <p style={{margin:0,fontSize:13,color:theme.text3}}>{inv.company}</p>
                <p style={{margin:'2px 0 0',fontSize:11,color:theme.text3}}>{inv.buyDate} · {inv.shares} acc @ {sym2}{inv.buyPrice}</p>
              </div>
              <button onClick={()=>{if(confirm('¿Eliminar?'))uInvs(invs.filter(i=>i.id!==inv.id))}} style={{background:'none',border:'none',color:theme.red,cursor:'pointer',opacity:.6}}><DelIc/></button>
            </div>
            <CL style={{padding:'12px 14px',marginBottom:10}}>
              {isLd?(<div style={{display:'flex',gap:8,alignItems:'center'}}><div className="sh" style={{width:80,height:24,backgroundImage:THEMES[Object.keys(THEMES)[0]].shimmer}}/><span style={{fontSize:12,color:theme.text3}}>Cargando...</span></div>)
              :p?.error?(<div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:12,color:theme.red}}>Error al cargar</span><button onClick={()=>fetchPrice(inv.ticker)} style={{background:'none',border:'none',color:theme.accent,cursor:'pointer',fontSize:12,display:'flex',alignItems:'center',gap:6}}><RefIc/>Reintentar</button></div>)
              :p?.price?(<div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}><div><p style={{margin:'0 0 2px',fontSize:10,color:theme.text3}}>Precio actual</p><p style={{margin:0,fontSize:26,fontWeight:700,fontFamily:'DM Mono',color:theme.text}}>{sym2}{p.price?.toFixed(2)}</p></div><div style={{textAlign:'right'}}><p style={{margin:'0 0 4px',fontSize:10,color:theme.text3}}>Hoy</p><span style={{color:p.change>=0?theme.green:theme.red,fontFamily:'DM Mono',fontWeight:600,fontSize:13}}>{p.change>=0?'+':''}{sym2}{p.change?.toFixed(2)}</span></div></div>)
              :(<button onClick={()=>fetchPrice(inv.ticker)} style={{background:'none',border:'none',color:theme.accent,cursor:'pointer',fontSize:12,display:'flex',alignItems:'center',gap:6}}><RefIc/>Cargar precio</button>)}
            </CL>
            {pl!==null&&(
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}}>
                {[['Invertido',`${sym2}${invested.toFixed(2)}`,theme.text3],['Ahora',`${sym2}${cur.toFixed(2)}`,pos?theme.green:theme.red],['P&L',`${pl>=0?'+':''}${plP.toFixed(1)}%`,pos?theme.green:theme.red]].map(([l,v,c])=>(
                  <CL key={l} style={{padding:'8px',textAlign:'center'}}><p style={{margin:'0 0 2px',fontSize:9,color:theme.text3}}>{l}</p><p style={{margin:0,fontSize:11,fontWeight:700,fontFamily:'DM Mono',color:c}}>{v}</p></CL>
                ))}
              </div>
            )}
            <div style={{marginBottom:10}}>
              <div style={{display:'flex',gap:6,marginBottom:10}}>
                {RANGES.map(r=>(
                  <button key={r} onClick={()=>{setRange(x=>({...x,[inv.ticker]:r}));fetchHist(inv.ticker,r)}} style={{flex:1,padding:'6px 4px',border:`1px solid ${selRange===r?theme.accent:theme.border}`,borderRadius:8,background:selRange===r?theme.accent2:theme.bg3,color:selRange===r?theme.accent:theme.text3,cursor:'pointer',fontSize:12,fontWeight:600}}>
                    {RANGE_LABELS[r]}
                  </button>
                ))}
              </div>
              {ldH[inv.ticker]?<div className="sh" style={{height:80,backgroundImage:theme.shimmer}}/>:<MiniChart ticker={inv.ticker} r={selRange}/>}
            </div>
            <button onClick={()=>{const ne=isExp?null:inv.id;setExpId(ne);if(!isExp){getAna(inv);if(!hist[`${inv.ticker}-${selRange}`])fetchHist(inv.ticker,selRange);}}} style={{width:'100%',background:`${theme.green}12`,color:theme.green,border:`1px solid ${theme.green}25`,borderRadius:10,padding:'10px',cursor:'pointer',fontSize:13,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              <StarIc/>{isExp?'Cerrar análisis':'Análisis Claude'}
            </button>
            {isExp&&(ldA[inv.id]||ana[inv.id])&&(
              <div style={{marginTop:10,background:`${theme.green}06`,border:`1px solid ${theme.green}18`,borderRadius:12,padding:14}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}><StarIc/><span style={{fontSize:12,fontWeight:600,color:theme.green}}>Opinión de Claude</span><span style={{fontSize:10,color:theme.text3}}>(no es asesoramiento)</span></div>
                {ldA[inv.id]?<div style={{display:'flex',flexDirection:'column',gap:6}}>{[100,80,90,60].map((w,i)=><div key={i} className="sh" style={{height:11,width:`${w}%`,backgroundImage:theme.shimmer}}/>)}</div>
                :<p style={{margin:0,fontSize:13,color:theme.text2,lineHeight:1.7}}>{ana[inv.id]}</p>}
              </div>
            )}
          </Card>
        );
      })}
    </div>
  );
};

// ── SETTINGS ──────────────────────────────────────────────────────────────────
const SettingsV=({themeName,uTheme,currency,uCurrency,exRate,uExRate,theme})=>{
  const [tmpRate,setTmpRate]=useState(exRate.toString());
  return(
    <div style={{paddingTop:8,display:'flex',flexDirection:'column',gap:16}}>
      <h2 style={{margin:0,fontSize:22,fontWeight:700,color:theme.text}}>Ajustes</h2>

      <Card style={{padding:20}}>
        <h3 style={{margin:'0 0 14px',fontSize:15,fontWeight:600,color:theme.text}}>💱 Divisa</h3>
        <div style={{display:'flex',gap:10,marginBottom:14}}>
          {['GBP','EUR'].map(c=>(
            <button key={c} onClick={()=>uCurrency(c)} style={{flex:1,padding:'12px',border:`2px solid ${currency===c?theme.accent:theme.border}`,borderRadius:12,background:currency===c?theme.accent2:theme.bg3,color:currency===c?theme.accent:theme.text3,cursor:'pointer',fontWeight:700,fontSize:18,transition:'all .2s'}}>
              {c==='GBP'?'£ GBP':'€ EUR'}
            </button>
          ))}
        </div>
        <div>
          <label style={{fontSize:11,color:theme.text3,display:'block',marginBottom:6,fontWeight:500,textTransform:'uppercase',letterSpacing:.5}}>Tipo de cambio (1£ = X€)</label>
          <div style={{display:'flex',gap:10}}>
            <Inp type="number" inputMode="decimal" value={tmpRate} onChange={e=>setTmpRate(e.target.value)} placeholder="1.17"/>
            <Btn onClick={()=>{const v=parseFloat(tmpRate);if(v>0)uExRate(v)}} style={{width:'auto',padding:'10px 16px'}}>Aplicar</Btn>
          </div>
          <p style={{margin:'8px 0 0',fontSize:12,color:theme.text3}}>Tasa actual: 1£ = {exRate}€ · 1€ = £{(1/exRate).toFixed(4)}</p>
        </div>
      </Card>

      <Card style={{padding:20}}>
        <h3 style={{margin:'0 0 14px',fontSize:15,fontWeight:600,color:theme.text}}>🎨 Tema de color</h3>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {Object.entries(THEMES).map(([key,t])=>(
            <button key={key} onClick={()=>uTheme(key)} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px',border:`2px solid ${themeName===key?t.accent:theme.border}`,borderRadius:14,background:themeName===key?t.accent2:theme.bg3,cursor:'pointer',transition:'all .2s',textAlign:'left'}}>
              <span style={{fontSize:24}}>{t.emoji}</span>
              <div style={{flex:1}}>
                <p style={{margin:0,fontWeight:600,fontSize:14,color:theme.text}}>{t.name}</p>
                <div style={{display:'flex',gap:4,marginTop:5}}>
                  {[t.accent,t.green,t.red,t.yellow,t.bg2].map((c,i)=><div key={i} style={{width:16,height:16,borderRadius:4,background:c}}/>)}
                </div>
              </div>
              {themeName===key&&<div style={{width:20,height:20,borderRadius:'50%',background:t.accent,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{color:'#fff',fontSize:12}}>✓</span></div>}
            </button>
          ))}
        </div>
      </Card>

      <Card style={{padding:20}}>
        <h3 style={{margin:'0 0 12px',fontSize:15,fontWeight:600,color:theme.text}}>👤 Cuenta</h3>
        <p style={{margin:'0 0 14px',fontSize:13,color:theme.text3}}>Tus datos son privados y están guardados en la nube. Solo tú puedes verlos.</p>
        <button onClick={()=>window._signOut()} style={{width:'100%',padding:'12px',border:`1px solid ${theme.red}40`,borderRadius:10,background:`${theme.red}10`,color:theme.red,cursor:'pointer',fontWeight:600,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          <OutIc/>Cerrar sesión
        </button>
      </Card>
    </div>
  );
};

// ── BOTTOM NAV ────────────────────────────────────────────────────────────────
const BottomNav=({view,setView,theme})=>{
  const tabs=[{id:'home',label:'Inicio',icon:<HomeIc/>},{id:'accounts',label:'Cuentas',icon:<WalIc/>},{id:'expenses',label:'Gastos',icon:<TrIc/>},{id:'investments',label:'Bolsa',icon:<InvIc/>},{id:'goals',label:'Metas',icon:<TgIc/>},{id:'settings',label:'Ajustes',icon:<SetIc/>}];
  const on=id=>view===id||(id==='home'&&view==='addSaving');
  return(
    <div style={{position:'fixed',bottom:0,left:0,right:0,background:theme.navBg,backdropFilter:'blur(20px)',borderTop:`1px solid ${theme.border}`,padding:'6px 2px',zIndex:100}}>
      <div style={{display:'flex',justifyContent:'space-around',maxWidth:480,margin:'0 auto'}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setView(t.id)} className={`nb ${on(t.id)?'on':''}`} style={{color:on(t.id)?theme.accent:theme.text3}}>
            {t.icon}<span>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
};

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>

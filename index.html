const genMonths=()=>{const l=[];const now=new Date();const y=now.getFullYear();const m=now.getMonth();for(let i=-3;i<=14;i++){const d=new Date(y,m+i,1);const my=d.getFullYear();const mm=d.getMonth();l.push({key:`${my}-${String(mm+1).padStart(2,'0')}`,label:`${MES[mm]} ${my}`,month:MES[mm],year:my});}return l;};

const waitFS=()=>new Promise(r=>{if(window._fsReady)return r();window.addEventListener('fsReady',r,{once:true});setTimeout(r,8000);});

const dbLoad=async(uid,key,fallback)=>{
  try{
    await waitFS();
    const snap=await window._getDoc(window._doc(window._db,`users/${uid}/data`,key));
    if(!snap.exists())return fallback;
    const val=snap.data().v;
    if(Array.isArray(fallback)&&!Array.isArray(val))return fallback;
    if(fallback!==null&&typeof fallback==='object'&&!Array.isArray(fallback)&&(typeof val!=='object'||Array.isArray(val)))return fallback;
    return val!=null?val:fallback;
  }catch(e){console.error('dbLoad',key,e);return fallback;}
};

const dbSave=async(uid,key,val)=>{
  try{
    await waitFS();
    await window._setDoc(window._doc(window._db,`users/${uid}/data`,key),{v:val});
  }catch(e){console.error('dbSave',key,e);}
};

const QuickExpenseModal=({cats,exps,uExps,mlist,exRate,currency,theme,onClose})=>{
  const [amt,setAmt]=useState('');
  const [cur,setCur]=useState(currency);
  const [selMonth,setSelMonth]=useState('');
  const [selCatId,setSelCatId]=useState(cats[0]?.id||null);
  const amtRef=useRef(null);
  useEffect(()=>{setTimeout(()=>amtRef.current?.focus(),300);},[]);
  const today=new Date();
  const defKey=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const defMonth=mlist.find(m=>m.key===defKey)||mlist[0];
  const confirm=()=>{
    if(!selCatId||!amt)return;
    const gbp=cur==='EUR'?(parseFloat(amt)||0)/exRate:(parseFloat(amt)||0);
    const mk=selMonth||defMonth?.key;
    if(!mk)return;
    const idx=exps.findIndex(x=>x.cid===selCatId&&x.mk===mk);
    let up;
    if(idx>=0){up=[...exps];up[idx]={...up[idx],amountGBP:(up[idx].amountGBP||0)+gbp};}
    else up=[...exps,{id:Date.now(),cid:selCatId,mk,amountGBP:gbp}];
    uExps(up);onClose();
  };
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal-sheet" style={{background:theme.bg2,border:`1px solid ${theme.border}`}}>
        <div style={{width:40,height:4,borderRadius:2,background:theme.border,margin:'0 auto 20px'}}/>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
          <div style={{width:38,height:38,borderRadius:12,background:theme.accent2,display:'flex',alignItems:'center',justifyContent:'center',color:theme.accent}}><ZapIc/></div>
          <p style={{margin:0,fontWeight:700,fontSize:17,color:theme.text}}>Gasto rápido</p>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:10}}>
            <div><label style={{fontSize:11,color:theme.text3,display:'block',marginBottom:5,fontWeight:500,textTransform:'uppercase',letterSpacing:.5}}>Cantidad</label>
              <input ref={amtRef} id="qamt" type="number" inputMode="decimal" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="0.00" className="inp" style={{background:theme.bg,border:`1px solid ${theme.border}`,color:theme.text}} onKeyDown={e=>e.key==='Enter'&&confirm()}/></div>
            <div style={{paddingTop:20}}><select value={cur} onChange={e=>setCur(e.target.value)} className="inp" style={{background:theme.bg,border:`1px solid ${theme.border}`,color:theme.text,appearance:'none',width:80}}><option value="GBP">£ GBP</option><option value="EUR">€ EUR</option></select></div>
          </div>
          <div><label style={{fontSize:11,color:theme.text3,display:'block',marginBottom:5,fontWeight:500,textTransform:'uppercase',letterSpacing:.5}}>Mes</label>
            <select value={selMonth||defMonth?.key||''} onChange={e=>setSelMonth(e.target.value)} className="inp" style={{background:theme.bg,border:`1px solid ${theme.border}`,color:theme.text,appearance:'none'}}>{mlist.map(m=><option key={m.key} value={m.key}>{m.label}</option>)}</select>
          </div>
          <div><label style={{fontSize:11,color:theme.text3,display:'block',marginBottom:8,fontWeight:500,textTransform:'uppercase',letterSpacing:.5}}>Categoría</label>
            <div style={{display:'flex',flexDirection:'column',gap:7,maxHeight:200,overflowY:'auto'}}>
              {cats.map(cat=>(<button key={cat.id} onClick={()=>setSelCatId(cat.id)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'11px 14px',border:`2px solid ${selCatId===cat.id?theme.accent:theme.border}`,borderRadius:12,background:selCatId===cat.id?theme.accent2:theme.bg3,cursor:'pointer',transition:'all .15s'}}>
                <span style={{fontSize:14,fontWeight:selCatId===cat.id?600:400,color:selCatId===cat.id?theme.accent:theme.text2}}>{cat.name}</span>
                {selCatId===cat.id&&<span style={{color:theme.accent,fontSize:16}}>✓</span>}
              </button>))}
            </div>
          </div>
          <button onClick={confirm} disabled={!amt||!selCatId} style={{background:theme.accent,color:'#fff',border:'none',borderRadius:12,padding:'14px',fontFamily:'DM Sans',fontWeight:700,fontSize:15,cursor:'pointer',width:'100%',marginTop:4,opacity:(!amt||!selCatId)?.5:1}}>Añadir gasto</button>
          <button onClick={onClose} style={{background:'none',border:'none',color:theme.text3,fontFamily:'DM Sans',fontSize:14,cursor:'pointer',padding:'4px 8px',width:'100%'}}>Cancelar</button>
        </div>

    </div>
  );
};

const Login=()=>{
  const t=THEMES.midnight;
  const [em,setEm]=useState('');const [pw,setPw]=useState('');const [err,setErr]=useState('');const [ld,setLd]=useState(false);const [mode,setMode]=useState('login');
  const go=async()=>{
    if(!em||!pw)return setErr('Introduce email y contraseña');
    setLd(true);setErr('');
    try{if(mode==='login')await window._signIn(em,pw);else await window._signUp(em,pw);}
    catch(e){setErr(mode==='login'?'Email o contraseña incorrectos':'Error al crear cuenta. Mínimo 6 caracteres.');}
    setLd(false);
  };
  return(
    <div style={{minHeight:'100vh',background:t.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{width:'100%',maxWidth:340}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{width:64,height:64,background:t.accent2,borderRadius:20,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',border:`1px solid ${t.accent}40`,fontSize:28}}>💰</div>
          <h1 style={{margin:'0 0 4px',fontSize:26,fontWeight:700,color:t.text}}>Mis Finanzas</h1>
          <p style={{margin:0,fontSize:13,color:t.text3}}>Tus datos, solo tuyos</p>
        </div>
        <div style={{background:t.bg2,border:`1px solid ${t.border}`,borderRadius:18,padding:24,display:'flex',flexDirection:'column',gap:14}}>
          <div style={{display:'flex',background:t.bg3,borderRadius:10,padding:3,border:`1px solid ${t.border}`}}>
            {['login','register'].map(m=>(
              <button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:'9px',border:'none',borderRadius:8,background:mode===m?t.accent:'transparent',color:mode===m?'#fff':t.text3,fontWeight:600,fontSize:13,cursor:'pointer',transition:'all .2s',fontFamily:'DM Sans'}}>
                {m==='login'?'Entrar':'Crear cuenta'}
              </button>
            ))}
          </div>
          <input type="email" value={em} onChange={e=>setEm(e.target.value)} placeholder="tu@email.com" onKeyDown={e=>e.key==='Enter'&&go()} style={{background:t.bg,border:`1px solid ${t.border}`,color:t.text,borderRadius:10,padding:'11px 14px',width:'100%',fontFamily:'DM Sans',fontSize:15,outline:'none'}}/>
          <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Contraseña" onKeyDown={e=>e.key==='Enter'&&go()} style={{background:t.bg,border:`1px solid ${t.border}`,color:t.text,borderRadius:10,padding:'11px 14px',width:'100%',fontFamily:'DM Sans',fontSize:15,outline:'none'}}/>
          {err&&<p style={{margin:0,fontSize:13,color:t.red,textAlign:'center'}}>{err}</p>}
          <button onClick={go} style={{background:t.accent,color:'#fff',border:'none',borderRadius:10,padding:'13px',fontFamily:'DM Sans',fontWeight:600,fontSize:15,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginTop:2}}>
            {ld?<Spin s={18} c='#fff'/>:(mode==='login'?'Entrar':'Crear cuenta')}
          </button>
        </div>
        <p style={{textAlign:'center',fontSize:11,color:t.text3,marginTop:14,opacity:.5}}>Cada cuenta tiene sus datos completamente separados</p>
      </div>
    </div>
  );
};

const App=()=>{
  const [user,setUser]=useState(undefined);
  const [view,setView]=useState('home');
  const [ld,setLd]=useState(true);
  const [sync,setSync]=useState(false);
  const [themeName,setThemeName]=useState('midnight');
  const [currency,setCurrency]=useState('GBP');
  const [exRate,setExRate]=useState(1.17);
  const theme=THEMES[themeName]||THEMES.midnight;
  const [dist,setDist]=useState(DEF_DIST());
  const [accs,setAccs]=useState(DEF_ACCS());
  const [savs,setSavs]=useState([]);
  const [cats,setCats]=useState(DEF_CATS());
  const [exps,setExps]=useState([]);
  const [goals,setGoals]=useState([]);
  const [invs,setInvs]=useState([]);
  const [mlist,setMlist]=useState(genMonths());
  const [showQuick,setShowQuick]=useState(false);

  useEffect(()=>{
    if(!window._onAuth)return;
    const unsub=window._onAuth(u=>setUser(u));
    return()=>unsub&&unsub();
  },[]);

  useEffect(()=>{
    if(user===undefined)return;
    if(!user){setLd(false);return;}
    const uid=user.uid;
    setLd(true);
    (async()=>{
      try{
        const [d,a,sv,c,e,g,iv,ml,tn,cu,er]=await Promise.all([
          dbLoad(uid,'dist',null),dbLoad(uid,'accs',null),dbLoad(uid,'savs',[]),
          dbLoad(uid,'cats',null),dbLoad(uid,'exps',[]),dbLoad(uid,'goals',[]),
          dbLoad(uid,'invs',[]),dbLoad(uid,'mlist',null),
          dbLoad(uid,'theme','midnight'),dbLoad(uid,'currency','GBP'),dbLoad(uid,'exRate',1.17),
        ]);
        if(d&&typeof d==='object'&&!Array.isArray(d))setDist(d);
        // FIX: usar null como señal de "no guardado en DB" en vez de length>0
        // Si la DB devuelve array (incluso vacío), lo usamos. Solo usamos default si devuelve null.
        if(Array.isArray(a))setAccs(a.length>0?a:DEF_ACCS());
        else if(a===null)setAccs(DEF_ACCS()); // primera vez: usar defaults
        if(sv&&Array.isArray(sv))setSavs(sv);
        if(Array.isArray(c))setCats(c.length>0?c:DEF_CATS());
        else if(c===null)setCats(DEF_CATS());
        if(e&&Array.isArray(e))setExps(e);
        if(g&&Array.isArray(g))setGoals(g);
        if(iv&&Array.isArray(iv))setInvs(iv);
        if(ml&&Array.isArray(ml)&&ml.length>0)setMlist(ml);
        if(tn&&typeof tn==='string')setThemeName(tn);
        if(cu&&typeof cu==='string')setCurrency(cu);
        if(er&&typeof er==='number')setExRate(er);
      }catch(err){console.error('Load error:',err);}
      setLd(false);
    })();
  },[user]);

  useEffect(()=>{document.body.style.background=theme.bg;document.body.style.color=theme.text;},[theme]);

  const uid=user?.uid;
  const save=(key,val)=>{if(!uid)return;setSync(true);dbSave(uid,key,val).finally(()=>setTimeout(()=>setSync(false),800));};
  const uDist=v=>{setDist(v);save('dist',v)};
  const uAccs=v=>{setAccs(v);save('accs',v)};
  const uSavs=v=>{setSavs(v);save('savs',v)};
  const uCats=v=>{setCats(v);save('cats',v)};
  const uExps=v=>{setExps(v);save('exps',v)};
  const uGoals=v=>{setGoals(v);save('goals',v)};
  const uInvs=v=>{setInvs(v);save('invs',v)};
  const uMlist=v=>{setMlist(v);save('mlist',v)};
  const uTheme=v=>{setThemeName(v);save('theme',v)};
  const uCurrency=v=>{setCurrency(v);save('currency',v)};
  const uExRate=v=>{setExRate(v);save('exRate',v)};
  const fmt=gbp=>currency==='EUR'?`€${((gbp||0)*exRate).toFixed(2)}`:`£${(gbp||0).toFixed(2)}`;
  const fmtN=gbp=>currency==='EUR'?(gbp||0)*exRate:(gbp||0);
  const sym=currency==='EUR'?'€':'£';
  const toGBP=val=>currency==='EUR'?val/exRate:val;
  const totBal=accs.reduce((s,a)=>s+(a.balanceGBP||0),0);
  const totSav=accs.filter(a=>a.type==='savings').reduce((s,a)=>s+(a.balanceGBP||0),0);

  if(user===undefined)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0f1117'}}><Spin/></div>;
  if(!user)return<Login/>;
  if(ld)return<div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,background:theme.bg}}><Spin c={theme.accent}/><p style={{color:theme.text3,fontSize:14,margin:0}}>Cargando tus datos...</p></div>;

  const sp={theme,dist,uDist,accs,uAccs,savs,uSavs,cats,uCats,exps,uExps,goals,uGoals,invs,uInvs,mlist,uMlist,totBal,totSav,setView,fmt,fmtN,sym,toGBP,currency,uCurrency,exRate,uExRate,themeName,uTheme};
  return(
    <ThemeCtx.Provider value={{theme,themeName}}>
      <div style={{minHeight:'100vh',background:theme.bg,paddingBottom:88}}>
        <div style={{position:'fixed',top:0,right:0,padding:'10px 14px',zIndex:100,display:'flex',alignItems:'center',gap:8}}>
          <span className="sd" style={{background:sync?theme.yellow:theme.green}}/>
          <span style={{fontSize:10,color:theme.text3,fontFamily:'DM Mono'}}>{sync?'guardando...':'guardado ✓'}</span>
          <button onClick={()=>window._signOut()} style={{background:'none',border:'none',color:theme.text3,cursor:'pointer',padding:'2px 4px',marginLeft:4}}><OutIc/></button>
        </div>
        <div style={{maxWidth:480,margin:'0 auto',padding:'16px 16px 0'}}>
          {view==='home'&&<HomeV {...sp}/>}
          {view==='addSaving'&&<AddSavV {...sp}/>}
          {view==='accounts'&&<AccsV {...sp}/>}
          {view==='expenses'&&<ExpsV {...sp}/>}
          {view==='stats'&&<StatsV {...sp}/>}
          {view==='goals'&&<GoalsV {...sp}/>}
          {view==='investments'&&<InvsV {...sp}/>}
          {view==='settings'&&<SettingsV {...sp}/>}
        </div>
        <BottomNav view={view} setView={setView} theme={theme}/>
        <button className="fab" onClick={()=>setShowQuick(true)} style={{background:theme.accent,color:'#fff',boxShadow:`0 4px 24px ${theme.accent}55`}}><ZapIc/></button>
        {showQuick&&<QuickExpenseModal cats={cats} exps={exps} uExps={uExps} mlist={mlist} exRate={exRate} currency={currency} theme={theme} onClose={()=>setShowQuick(false)}/>}
      </div>
    </ThemeCtx.Provider>
  );
};

const Card=({children,style})=>{const {theme}=useTheme();return<div className="card" style={{background:theme.bg2,border:`1px solid ${theme.border}`,...style}}>{children}</div>};
const CL=({children,style})=>{const {theme}=useTheme();return<div className="cl" style={{background:theme.bg3,border:`1px solid ${theme.border}`,...style}}>{children}</div>};
const Inp=({style,...p})=>{const {theme}=useTheme();return<input className="inp" style={{background:theme.bg,border:`1px solid ${theme.border}`,color:theme.text,...style}} {...p}/>};
const Sel=({children,style,...p})=>{const {theme}=useTheme();return<select className="inp" style={{background:theme.bg,border:`1px solid ${theme.border}`,color:theme.text,appearance:'none',...style}} {...p}>{children}</select>};
const Btn=({children,onClick,style})=>{const {theme}=useTheme();return<button onClick={onClick} className="bp" style={{background:theme.accent,color:'#fff',...style}}>{children}</button>};
const BtnS=({children,onClick,style})=>{const {theme}=useTheme();return<button onClick={onClick} className="bs" style={{background:theme.bg3,color:theme.text,...style}}>{children}</button>};

const HomeV=({dist,uDist,accs,totBal,cats,exps,goals,invs,fmt,fmtN,sym,exRate,currency,theme})=>{
  const [ek,setEk]=useState(null);const [tp,setTp]=useState('');
  const [chatMsg,setChatMsg]=useState('');const [chatHistory,setChatHistory]=useState([]);const [chatLd,setChatLd]=useState(false);
  const chatEndRef=useRef(null);
  const saveP=k=>{const v=parseInt(tp);if(!isNaN(v)&&v>=0&&v<=100)uDist({...dist,[k]:{...dist[k],pct:v}});setEk(null);setTp('')};
  const distColors={madre:theme.red,inversion:theme.green,ahorro:theme.accent,caprichos:theme.yellow};

  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:'smooth'});},[chatHistory]);

  const buildContext=()=>{
    const totBal2=accs.reduce((s,a)=>s+(a.balanceGBP||0),0);
    const savBal=accs.filter(a=>a.type==='savings').reduce((s,a)=>s+(a.balanceGBP||0),0);
    const accsStr=accs.map(a=>`${a.name} (${a.type}): ${sym}${fmtN(a.balanceGBP||0).toFixed(2)}`).join(', ');
    const today=new Date();const mk=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
    const gastosMes=cats.map(c=>{const e=exps.find(x=>x.cid===c.id&&x.mk===mk);return e?`${c.name}: ${sym}${fmtN(e.amountGBP||0).toFixed(2)}`:null;}).filter(Boolean).join(', ')||'Sin gastos registrados este mes';
    const distStr=Object.entries(dist).map(([,v])=>`${v.label}: ${v.pct}%`).join(', ');
    const goalsStr=goals.length?goals.map(g=>`${g.name}: ${sym}${fmtN(g.saved).toFixed(0)}/${sym}${fmtN(g.target).toFixed(0)}`).join(', '):'Sin metas';
    const invsStr=invs.length?invs.map(i=>`${i.ticker} ${i.shares}acc@${i.invCurrency||'USD'}${i.buyPrice}`).join(', '):'Sin inversiones aún';
    return `Eres un asesor financiero personal cercano y directo. Hablas en español informal. El usuario tiene estos datos financieros reales:\n- Balance total: ${sym}${fmtN(totBal2).toFixed(2)}\n- Cuentas: ${accsStr}\n- Ahorro: ${sym}${fmtN(savBal).toFixed(2)}\n- Gastos este mes: ${gastosMes}\n- Distribución mensual: ${distStr}\n- Metas: ${goalsStr}\n- Inversiones: ${invsStr}\n- Divisa principal: ${currency}\n\nEl usuario no tiene inversiones reales todavía y quiere empezar. Da consejos concretos, personalizados a sus datos reales. Sé honesto y directo. Máximo 4-5 frases por respuesta. Recuerda que no eres un asesor financiero oficial.`;
  };

  const sendMsg=async()=>{
    if(!chatMsg.trim()||chatLd)return;
    const userMsg=chatMsg.trim();
    setChatMsg('');
    const newHistory=[...chatHistory,{role:'user',content:userMsg}];
    setChatHistory(newHistory);
    setChatLd(true);
    try{
      const messages=newHistory.map(m=>({role:m.role,content:m.content}));
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,system:buildContext(),messages})});
      const d=await res.json();
      const reply=d.content?.find(c=>c.type==='text')?.text||'Error al conectar.';
      setChatHistory([...newHistory,{role:'assistant',content:reply}]);
    }catch{
      setChatHistory([...newHistory,{role:'assistant',content:'Error al conectar. Inténtalo de nuevo.'}]);
    }
    setChatLd(false);
  };

  const SUGGESTIONS=['¿Por dónde empiezo a invertir?','¿Cuánto debería ahorrar al mes?','¿Qué hago con mi dinero ahora mismo?'];

  return(
    <div style={{paddingTop:8,display:'flex',flexDirection:'column',gap:16}}>
      <div style={{background:theme.hero,borderRadius:20,padding:'22px 20px',border:`1px solid ${theme.heroBorder}`,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-20,right:-20,width:100,height:100,borderRadius:'50%',background:'rgba(255,255,255,.05)'}}/>
        <p style={{fontSize:11,color:'rgba(255,255,255,.5)',fontWeight:500,letterSpacing:1,textTransform:'uppercase',margin:0}}>Balance Total</p>
        <p style={{fontSize:36,fontWeight:700,margin:'4px 0 14px',fontFamily:'DM Mono',color:'#fff'}}>{fmt(totBal)}</p>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {accs.map(a=>(
            <div key={a.id} style={{background:'rgba(255,255,255,.08)',borderRadius:10,padding:'6px 12px',border:'1px solid rgba(255,255,255,.12)'}}>
              <p style={{margin:0,fontSize:10,color:'rgba(255,255,255,.45)'}}>{a.name}</p>
              <p style={{margin:0,fontSize:14,fontWeight:700,color:'#fff',fontFamily:'DM Mono'}}>{fmt(a.balanceGBP||0)}</p>
              <p style={{margin:0,fontSize:9,color:'rgba(255,255,255,.3)'}}>{a.type==='current'?'🏦 Corriente':a.type==='savings'?'💰 Ahorro':'📈 Inversión'}</p>
            </div>
          ))}
        </div>
      </div>

      {/* ADVISOR CARD */}
      <Card style={{padding:0,overflow:'hidden'}}>
        <div style={{padding:'16px 18px 12px',borderBottom:`1px solid ${theme.border}`,display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,borderRadius:10,background:theme.accent2,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🤖</div>
          <div>
            <p style={{margin:0,fontWeight:700,fontSize:15,color:theme.text}}>Asesor IA</p>
            <p style={{margin:0,fontSize:11,color:theme.text3}}>Conoce todos tus datos · Pregunta lo que quieras</p>
          </div>
        </div>

        {chatHistory.length===0&&(
          <div style={{padding:'14px 16px'}}>
            <p style={{margin:'0 0 10px',fontSize:12,color:theme.text3}}>Sugerencias:</p>
            <div style={{display:'flex',flexDirection:'column',gap:7}}>
              {SUGGESTIONS.map((s,i)=>(
                <button key={i} onClick={()=>{setChatMsg(s);}} style={{background:theme.bg3,border:`1px solid ${theme.border}`,borderRadius:10,padding:'10px 14px',color:theme.text2,fontSize:13,cursor:'pointer',textAlign:'left',fontFamily:'DM Sans'}}>
                  {s}
                </button>
              ))}
            </div>
          </div>
        )}

        {chatHistory.length>0&&(
          <div style={{padding:'14px 16px',display:'flex',flexDirection:'column',gap:12,maxHeight:320,overflowY:'auto'}}>
            {chatHistory.map((m,i)=>(
              <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
                <div style={{maxWidth:'85%',padding:'10px 14px',borderRadius:m.role==='user'?'16px 16px 4px 16px':'16px 16px 16px 4px',background:m.role==='user'?theme.accent:theme.bg3,border:`1px solid ${m.role==='user'?theme.accent:theme.border}`}}>
                  <p style={{margin:0,fontSize:13,color:m.role==='user'?'#fff':theme.text2,lineHeight:1.6,whiteSpace:'pre-wrap'}}>{m.content}</p>
                </div>
              </div>
            ))}
            {chatLd&&(
              <div style={{display:'flex',justifyContent:'flex-start'}}>
                <div style={{padding:'12px 16px',borderRadius:'16px 16px 16px 4px',background:theme.bg3,border:`1px solid ${theme.border}`,display:'flex',gap:5,alignItems:'center'}}>
                  {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:theme.text3,animation:`pulse ${0.6+i*0.2}s infinite`}}/>)}
                </div>
              </div>
            )}
            <div ref={chatEndRef}/>
          </div>
        )}

        <div style={{padding:'10px 14px',borderTop:`1px solid ${theme.border}`,display:'flex',gap:8}}>
          <input value={chatMsg} onChange={e=>setChatMsg(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&sendMsg()} placeholder="Pregunta algo sobre tus finanzas..." className="inp" style={{background:theme.bg,border:`1px solid ${theme.border}`,color:theme.text,flex:1,padding:'10px 14px',fontSize:14}}/>
          <button onClick={sendMsg} disabled={!chatMsg.trim()||chatLd} style={{background:theme.accent,border:'none',borderRadius:10,padding:'10px 14px',cursor:'pointer',color:'#fff',opacity:(!chatMsg.trim()||chatLd)?.5:1,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Ic d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" s={18} c='#fff'/>
          </button>
        </div>
        {chatHistory.length>0&&<button onClick={()=>setChatHistory([])} style={{background:'none',border:'none',color:theme.text3,fontSize:11,cursor:'pointer',padding:'4px 16px 10px',fontFamily:'DM Sans'}}>Limpiar conversación</button>}
      </Card>

      <Card style={{padding:20}}>
        <h3 style={{margin:'0 0 12px',fontSize:15,fontWeight:600,color:theme.text}}>Distribución Mensual</h3>
        <div style={{height:8,borderRadius:4,overflow:'hidden',display:'flex',marginBottom:12}}>
          {Object.entries(dist).map(([k,v])=><div key={k} style={{width:`${v.pct}%`,background:distColors[k]||theme.accent,transition:'width .4s'}}/>)}
        </div>
        {Object.entries(dist).map(([k,item])=>(
          <CL key={k} style={{padding:'10px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:10,height:10,borderRadius:'50%',background:distColors[k]||theme.accent}}/>
              <span style={{fontSize:13,color:theme.text2}}>{item.label}</span>
            </div>
            {ek===k?(
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <Inp type="number" inputMode="numeric" value={tp} onChange={e=>setTp(e.target.value)} style={{width:56,padding:'6px 8px',textAlign:'center'}} autoFocus onBlur={()=>saveP(k)} onKeyDown={e=>e.key==='Enter'&&saveP(k)}/>
                <button onClick={()=>saveP(k)} style={{background:theme.accent,color:'#fff',border:'none',borderRadius:8,padding:'6px 10px',cursor:'pointer',fontSize:13,fontWeight:600}}>OK</button>
              </div>
            ):(
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:17,fontWeight:700,fontFamily:'DM Mono',color:distColors[k]||theme.accent}}>{item.pct}%</span>
                <button onClick={()=>{setEk(k);setTp(item.pct.toString())}} style={{background:'none',border:'none',color:theme.text3,cursor:'pointer',padding:4}}><EditIc/></button>
              </div>
            )}
          </CL>
        ))}
      </Card>
    </div>
  );
};

const AddSavV=({setView})=>{
  useEffect(()=>setView('home'),[]);
  return null;
};

const AccsV=({accs,uAccs,totBal,fmt,exRate,theme})=>{
  const [show,setShow]=useState(false);const [eid,setEid]=useState(null);
  const [nw,setNw]=useState({name:'',type:'current',balance:'',cur:'GBP'});
  const [tb,setTb]=useState('');const [tCur,setTCur]=useState('GBP');
  const tc=t=>t==='savings'?theme.green:t==='investment'?theme.yellow:theme.accent;
  return(
    <div style={{paddingTop:8,display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><h2 style={{margin:'0 0 2px',fontSize:22,fontWeight:700,color:theme.text}}>Mis Cuentas</h2><p style={{margin:0,fontSize:13,color:theme.text3,fontFamily:'DM Mono'}}>Total {fmt(totBal)}</p></div>
        <Btn onClick={()=>setShow(true)} style={{width:'auto',padding:'10px 16px',display:'flex',alignItems:'center',gap:6}}><PlusIc/>Añadir</Btn>
      </div>
      {show&&(
        <Card style={{padding:20,display:'flex',flexDirection:'column',gap:12}}>
          <Inp type="text" placeholder="Nombre (ej: Monzo)" value={nw.name} onChange={e=>setNw({...nw,name:e.target.value})}/>
          <Sel value={nw.type} onChange={e=>setNw({...nw,type:e.target.value})}>
            <option value="current">🏦 Corriente</option><option value="savings">💰 Ahorro</option><option value="investment">📈 Inversión</option>
          </Sel>
          <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:10}}>
            <Inp type="number" inputMode="decimal" placeholder="Balance inicial" value={nw.balance} onChange={e=>setNw({...nw,balance:e.target.value})}/>
            <Sel value={nw.cur} onChange={e=>setNw({...nw,cur:e.target.value})} style={{width:80}}><option value="GBP">£ GBP</option><option value="EUR">€ EUR</option></Sel>
          </div>
          <div style={{display:'flex',gap:10}}>
            <Btn onClick={()=>{if(nw.name&&nw.balance!==''){const gbp=nw.cur==='EUR'?parseFloat(nw.balance)/exRate:parseFloat(nw.balance)||0;uAccs([...accs,{id:Date.now(),name:nw.name,type:nw.type,balanceGBP:gbp}]);setNw({name:'',type:'current',balance:'',cur:'GBP'});setShow(false)}}}>Guardar</Btn>
            <BtnS onClick={()=>setShow(false)}>Cancelar</BtnS>
          </div>
        </Card>
      )}
      {accs.map(a=>(
        <Card key={a.id} style={{padding:20}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:44,height:44,borderRadius:12,background:`${tc(a.type)}18`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>{a.type==='savings'?'💰':a.type==='investment'?'📈':'🏦'}</div>
              <div><p style={{margin:0,fontWeight:600,fontSize:16,color:theme.text}}>{a.name}</p><p style={{margin:0,fontSize:12,color:theme.text3}}>{a.type==='savings'?'💰 Ahorro':a.type==='investment'?'📈 Inversión':'🏦 Corriente'}</p></div>
            </div>
            <button onClick={()=>{if(confirm('¿Eliminar?'))uAccs(accs.filter(x=>x.id!==a.id))}} style={{background:'none',border:'none',color:theme.red,cursor:'pointer',opacity:.6}}><DelIc/></button>
          </div>
          {eid===a.id?(
            <div style={{display:'flex',gap:8}}>
              <Inp type="number" inputMode="decimal" value={tb} onChange={e=>setTb(e.target.value)} autoFocus onKeyDown={e=>{if(e.key==='Enter'){const gbp=tCur==='EUR'?parseFloat(tb)/exRate:parseFloat(tb)||0;uAccs(accs.map(x=>x.id===a.id?{...x,balanceGBP:gbp}:x));setEid(null)}}}/>
              <Sel value={tCur} onChange={e=>setTCur(e.target.value)} style={{width:80}}><option value="GBP">£</option><option value="EUR">€</option></Sel>
              <Btn onClick={()=>{const gbp=tCur==='EUR'?parseFloat(tb)/exRate:parseFloat(tb)||0;uAccs(accs.map(x=>x.id===a.id?{...x,balanceGBP:gbp}:x));setEid(null)}} style={{width:'auto',padding:'10px 16px'}}>OK</Btn>
            </div>
          ):(
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:26,fontWeight:700,fontFamily:'DM Mono',color:tc(a.type)}}>{fmt(a.balanceGBP||0)}</span>

          <Inp type="text" placeholder="Nueva categoría" value={newCat} onChange={e=>setNewCat(e.target.value)} autoFocus onKeyDown={e=>{if(e.key==='Enter'&&newCat.trim()){uCats([...cats,{id:Date.now(),name:newCat.trim(),def:0}]);setNewCat('');setShowCat(false)}}}/>
          <div style={{display:'flex',gap:10}}>

          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <Sel value={inputCur} onChange={e=>setInputCur(e.target.value)} style={{width:80,padding:'4px 8px',fontSize:12}}><option value="GBP">£ GBP</option><option value="EUR">€ EUR</option></Sel>
            <button onClick={()=>setShowMon(!showMon)} style={{background:theme.accent2,color:theme.tagText||theme.accent,border:'none',borderRadius:6,padding:'4px 10px',fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}><PlusIc/>Mes</button>
          </div>

            <button onClick={addMonth} style={{background:theme.accent,color:'#fff',border:'none',borderRadius:10,padding:'8px 14px',cursor:'pointer',fontWeight:600,fontSize:13}}>+</button>

        <div className="msc">

          <div style={{display:'flex',flexDirection:'column',gap:8}}>

const StatsV=({cats,exps,totSav,mlist,fmt,fmtN,sym,theme})=>{
  const COLS=['#ff6b6b','#f59e0b','#22d3a5','#6c63ff','#ec4899','#8b5cf6','#10b981','#f97316'];
  const ct=cats.map(c=>({name:c.name,amt:exps.filter(e=>e.cid===c.id).reduce((s,e)=>s+(e.amountGBP||0),0)})).filter(c=>c.amt>0);
  const tE=ct.reduce((s,c)=>s+c.amt,0);
  const mt=mlist.map(m=>({label:m.label.slice(0,6),tot:cats.reduce((s,c)=>{const e=exps.find(x=>x.cid===c.id&&x.mk===m.key);return s+(e?(e.amountGBP||0):0);},0)})).filter(m=>m.tot>0).slice(-8);
  const mx=Math.max(...mt.map(m=>m.tot),1);
  const LineChart=()=>{
    if(mt.length<2)return null;
    const W=320,H=90,pad=10;
    const xs=mt.map((_,i)=>pad+(i/(mt.length-1))*(W-pad*2));
    const ys=mt.map(m=>H-pad-(m.tot/mx)*(H-pad*2));
    const pts=xs.map((x,i)=>`${x},${ys[i]}`).join(' ');
    return(<svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:'block',overflow:'visible'}}>
      <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={theme.accent} stopOpacity="0.3"/><stop offset="100%" stopColor={theme.accent} stopOpacity="0"/></linearGradient></defs>
      <polygon points={`${xs[0]},${H} ${pts} ${xs[xs.length-1]},${H}`} fill="url(#lg)"/>
      <polyline points={pts} fill="none" stroke={theme.accent} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      {xs.map((x,i)=>(<g key={i}><circle cx={x} cy={ys[i]} r={4} fill={theme.accent} stroke={theme.bg2} strokeWidth={2}/><text x={x} y={H} textAnchor="middle" fill={theme.text3} fontSize="8">{mt[i].label}</text><text x={x} y={ys[i]-10} textAnchor="middle" fill={theme.text2} fontSize="8" fontFamily="DM Mono">{sym}{fmtN(mt[i].tot).toFixed(0)}</text></g>))}
    </svg>);
  };
  return(
    <div style={{paddingTop:8,display:'flex',flexDirection:'column',gap:14}}>
      <h2 style={{margin:0,fontSize:22,fontWeight:700,color:theme.text}}>Estadísticas</h2>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <Card style={{padding:16}}><p style={{margin:'0 0 4px',fontSize:11,color:theme.text3,textTransform:'uppercase',letterSpacing:.5}}>Gastos acum.</p><p style={{margin:0,fontSize:22,fontWeight:700,fontFamily:'DM Mono',color:theme.red}}>{sym}{fmtN(tE).toFixed(0)}</p></Card>
        <Card style={{padding:16}}><p style={{margin:'0 0 4px',fontSize:11,color:theme.text3,textTransform:'uppercase',letterSpacing:.5}}>En ahorro</p><p style={{margin:0,fontSize:22,fontWeight:700,fontFamily:'DM Mono',color:theme.green}}>{sym}{fmtN(totSav).toFixed(0)}</p></Card>
      </div>
      {mt.length>=2&&(<Card style={{padding:20}}><h3 style={{margin:'0 0 16px',fontSize:15,fontWeight:600,color:theme.text}}>Evolución de Gastos</h3><div style={{paddingBottom:14,paddingTop:10}}><LineChart/></div></Card>)}
      {ct.length>0&&(<Card style={{padding:20}}><h3 style={{margin:'0 0 14px',fontSize:15,fontWeight:600,color:theme.text}}>Por Categoría</h3><div style={{height:8,borderRadius:4,overflow:'hidden',display:'flex',marginBottom:14}}>{ct.map((c,i)=><div key={i} style={{flex:c.amt,background:COLS[i%8]}}/>)}</div>{[...ct].sort((a,b)=>b.amt-a.amt).map((c,i)=>(<div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}><div style={{width:10,height:10,borderRadius:3,background:COLS[i%8],flexShrink:0}}/><span style={{fontSize:13,color:theme.text2,flex:1}}>{c.name}</span><span style={{fontSize:13,fontFamily:'DM Mono',color:theme.text,fontWeight:500}}>{sym}{fmtN(c.amt).toFixed(0)}</span><span style={{fontSize:11,color:theme.text3,fontFamily:'DM Mono',width:34,textAlign:'right'}}>{tE>0?((c.amt/tE)*100).toFixed(0):0}%</span></div>))}</Card>)}
    </div>
  );
};

        <h3 style={{margin:'0 0 12px',fontSize:15,fontWeight:600,color:theme.text}}>👤 Cuenta</h3>
        <p style={{margin:'0 0 14px',fontSize:13,color:theme.text3}}>Tus datos son privados y solo tú puedes verlos.</p>
        <button onClick={()=>window._signOut()} style={{width:'100%',padding:'12px',border:`1px solid ${theme.red}40`,borderRadius:10,background:`${theme.red}10`,color:theme.red,cursor:'pointer',fontWeight:600,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}><OutIc/>Cerrar sesión</button>
      </Card>
    </div>
  );
};

const BottomNav=({view,setView,theme})=>{
  const tabs=[{id:'home',label:'Inicio',icon:<HomeIc/>},{id:'accounts',label:'Cuentas',icon:<WalIc/>},{id:'expenses',label:'Gastos',icon:<TrIc/>},{id:'investments',label:'Bolsa',icon:<InvIc/>},{id:'goals',label:'Metas',icon:<TgIc/>},{id:'settings',label:'Ajustes',icon:<SetIc/>}];
  const on=id=>view===id||(id==='home'&&view==='addSaving');
  return(<div style={{position:'fixed',bottom:0,left:0,right:0,background:theme.navBg,backdropFilter:'blur(20px)',borderTop:`1px solid ${theme.border}`,padding:'6px 2px',zIndex:100}}>
    <div style={{display:'flex',justifyContent:'space-around',maxWidth:480,margin:'0 auto'}}>
      {tabs.map(t=>(<button key={t.id} onClick={()=>setView(t.id)} className="nb" style={{color:on(t.id)?theme.accent:theme.text3}}>{t.icon}<span>{t.label}</span></button>))}
    </div>
  </div>);
};

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
